<div class="page">
  <div class="page-header">
    <div>
      <h1>Biến thể</h1>
      <div class="sub">
        {{ product?.name || 'Sản phẩm' }} • SKU: {{ variant?.sku || '-' }}
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" (click)="backToProduct()">← Quay lại</button>
      <button class="btn btn-primary" [disabled]="!variant" (click)="askSave()">Lưu</button>
      <button
        class="btn"
        [class.btn-danger]="(form.value.variant_status||'active')==='active'"
        [class.btn-success]="(form.value.variant_status||'active')!=='active'"
        [disabled]="!variant"
        (click)="askToggleStatus()"
      >
        {{ (form.value.variant_status||'active')==='active' ? 'Inactive' : 'Active' }}
      </button>
    </div>
  </div>

  <div class="state" *ngIf="isLoading">Đang tải...</div>

  <div class="body" *ngIf="!isLoading && variant">
    <section class="card preview">
      <img [src]="thumbnail || 'https://cdn.hstatic.net/shared/noDefaultImage6_master.gif'" [alt]="variant?.variant_name || variant?.name" />
    </section>

    <section class="card">
      <div class="grid">
        <div class="field">
          <label>Tên biến thể *</label>
          <input type="text" [formControl]="form.controls.variant_name" />
          <small class="err" *ngIf="form.controls.variant_name.touched && form.controls.variant_name.invalid">Bắt buộc</small>
        </div>

        <div class="field">
          <label>SKU *</label>
          <input type="text" [formControl]="form.controls.sku" />
        </div>

        <div class="field">
          <label>Màu</label>
          <input type="text" [formControl]="form.controls.color" />
        </div>

        <div class="field">
          <label>Giá</label>
          <input type="number" [formControl]="form.controls.price" />
        </div>

        <div class="field">
          <label>Giá so sánh</label>
          <input type="number" [formControl]="form.controls.compare_at_price" />
        </div>

        <div class="field">
          <label>Tồn kho</label>
          <input type="number" [formControl]="form.controls.stock_quantity" />
        </div>

        <div class="field">
          <label>Trạng thái bán</label>
          <select [formControl]="form.controls.status">
            <option value="available">available</option>
            <option value="unavailable">unavailable</option>
          </select>
        </div>

        <div class="field">
          <label>Trạng thái quản trị</label>
          <select [formControl]="form.controls.variant_status">
            <option value="active">active</option>
            <option value="inactive">inactive</option>
          </select>
        </div>

        <div class="field">
          <label>Đã bán</label>
          <input type="number" [formControl]="form.controls.sold" />
        </div>
      </div>
    </section>
  </div>

  <div class="overlay" *ngIf="showConfirm"></div>

  <div class="confirm" *ngIf="showConfirm">
    <h3>Xác nhận</h3>
    <p>{{ confirmMessage }}</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" (click)="closeConfirm()">Hủy</button>
      <button class="btn btn-primary" (click)="runConfirm()">OK</button>
    </div>
  </div>

  <div class="overlay" *ngIf="showLeaveConfirm"></div>

  <div class="confirm" *ngIf="showLeaveConfirm">
    <h3>Chưa lưu thay đổi</h3>
    <p>Dữ liệu chưa được lưu. Nếu rời trang, các thay đổi sẽ bị mất.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" (click)="stayOnPage()">Ở lại</button>
      <button class="btn btn-primary" (click)="leavePage()">Rời trang</button>
    </div>
  </div>
</div>
