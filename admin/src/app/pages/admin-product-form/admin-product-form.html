<div class="page">
  <div class="page-header">
    <div>
      <h1>{{ isEdit ? 'Sửa sản phẩm' : 'Thêm sản phẩm' }}</h1>
      <div class="sub">Slug sẽ tự tạo theo tên sản phẩm</div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" (click)="back()">← Quay lại</button>
      <button class="btn btn-primary" (click)="askSave()">Lưu</button>
    </div>
  </div>

  <div class="card">
    <div class="grid">
      <div class="field">
        <label>Tên sản phẩm *</label>
        <input type="text" [formControl]="form.controls.name" />
        <small class="err" *ngIf="form.controls.name.touched && form.controls.name.invalid">Bắt buộc</small>
      </div>

      <div class="field">
        <label>Slug tự sinh</label>
        <input type="text" [value]="liveSlug" readonly />
      </div>

      <div class="field">
        <label>SKU</label>
        <input type="text" [formControl]="form.controls.sku" />
      </div>

      <div class="field">
        <label>Brand</label>
        <input type="text" [formControl]="form.controls.brand" />
      </div>

      <div class="field">
        <label>Trạng thái *</label>
        <select [formControl]="form.controls.status">
          <option value="active">active</option>
          <option value="inactive">inactive</option>
        </select>
      </div>

      <div class="field">
        <label>Danh mục *</label>
        <select [formControl]="form.controls.category_id">
          <option value="">-- chọn --</option>
          <option *ngFor="let c of categories" [value]="c._id">{{ c.name }}</option>
        </select>
        <small class="err" *ngIf="form.controls.category_id.touched && form.controls.category_id.invalid">Bắt buộc</small>
      </div>

      <div class="field">
        <label>Bộ sưu tập</label>
        <select [formControl]="form.controls.collection_id">
          <option value="">-- chọn --</option>
          <option *ngFor="let c of collections" [value]="c._id">{{ c.name }}</option>
        </select>
      </div>

      <div class="field">
        <label>Loại sản phẩm</label>
        <input type="text" [formControl]="form.controls.product_type" />
      </div>

      <div class="field full">
        <label>URL nguồn</label>
        <input type="text" [formControl]="form.controls.url" />
      </div>

      <div class="field full">
        <label>Mô tả ngắn</label>
        <textarea rows="4" [formControl]="form.controls.short_description"></textarea>
      </div>

      <div class="field full">
        <label>Mô tả chi tiết</label>
        <div class="editor-shell">
          <div class="editor-toolbar" (mousedown)="preventToolbarFocus($event)">
            <button type="button" class="toolbar-btn" title="In đậm" (click)="formatDescription('bold')"><b>B</b></button>
            <button type="button" class="toolbar-btn" title="In nghiêng" (click)="formatDescription('italic')"><i>I</i></button>
            <button type="button" class="toolbar-btn" title="Gạch chân" (click)="formatDescription('underline')"><u>U</u></button>
            <span class="toolbar-sep"></span>
            <button type="button" class="toolbar-btn icon-btn" title="Căn trái" (click)="alignDescription('justifyLeft')">≡</button>
            <button type="button" class="toolbar-btn icon-btn" title="Căn giữa" (click)="alignDescription('justifyCenter')">≣</button>
            <button type="button" class="toolbar-btn icon-btn" title="Căn phải" (click)="alignDescription('justifyRight')">☰</button>
            <span class="toolbar-sep"></span>
            <div class="image-menu">
              <button type="button" class="toolbar-btn icon-btn" title="Chèn ảnh" (click)="toggleImageMenu($event)">🖼</button>
              <div class="image-dropdown" *ngIf="showImageMenu">
                <button type="button" (click)="insertImageFromUrl()">Nhập URL ảnh</button>
                <button type="button" (click)="openImagePicker(imageInput)">Tải ảnh từ máy</button>
              </div>
              <input #imageInput type="file" accept="image/*" hidden (change)="onImageFileSelected($event)" />
            </div>

            <div class="image-size-tools" *ngIf="selectedEditorImage">
              <button type="button" class="toolbar-btn" title="Thu nhỏ ảnh" (click)="decreaseSelectedImage()">−</button>
              <button
                type="button"
                class="percent-display"
                *ngIf="!isEditingImagePercent"
                title="Double click để nhập %"
                (dblclick)="startEditImagePercent()"
              >
                {{ selectedImagePercent }}%
              </button>
              <input
                *ngIf="isEditingImagePercent"
                type="number"
                min="10"
                max="100"
                [(ngModel)]="draftImagePercent"
                (blur)="applyDraftImagePercent()"
                (keydown)="onPercentInputKeydown($event)"
              />
              <button type="button" class="toolbar-btn" title="Phóng to ảnh" (click)="increaseSelectedImage()">+</button>
            </div>
          </div>
          <div
            #descriptionEditor
            class="editor-content"
            contenteditable="true"
            (input)="onDescriptionInput()"
            (click)="onEditorClick($event)"
            (mouseup)="captureSelection()"
            (keyup)="captureSelection()"
            (blur)="captureSelection()"
          ></div>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" *ngIf="showConfirm"></div>

  <div class="confirm" *ngIf="showConfirm">
    <h3>Xác nhận</h3>
    <p>{{ confirmMessage }}</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" (click)="closeConfirm()">Hủy</button>
      <button class="btn btn-primary" (click)="runConfirm()">OK</button>
    </div>
  </div>

  <div class="overlay" *ngIf="showLeaveConfirm"></div>

  <div class="confirm" *ngIf="showLeaveConfirm">
    <h3>Chưa lưu thay đổi</h3>
    <p>Dữ liệu chưa được lưu. Nếu rời trang, các thay đổi sẽ bị mất.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" (click)="stayOnPage()">Ở lại</button>
      <button class="btn btn-primary" (click)="leavePage()">Rời trang</button>
    </div>
  </div>
</div>
