<div class="news-page">
  <nav class="breadcrumb">
    <a routerLink="/">Trang chu</a>
    <span class="sep">/</span>
    <span class="current">Media</span>
  </nav>

  <div class="news-layout">
    <aside class="latest-sidebar">
      <h2 class="sidebar-title">Bai viet moi nhat</h2>

      <div class="sidebar-list" *ngIf="latestPosts.length > 0; else sidebarEmpty">
        <a
          class="sidebar-item"
          *ngFor="let post of latestPosts; trackBy: trackByPostId"
          [routerLink]="['/tin-tuc', post.slug]"
        >
          <img [src]="post.thumbnailUrl" [alt]="post.title" (error)="onImageError($event)" />
          <div class="sidebar-item-content">
            <h3>{{ post.title }}</h3>
            <p>{{ post.category }}</p>
            <span>{{ formatDate(post.createdAt) }}</span>
          </div>
        </a>
      </div>

      <ng-template #sidebarEmpty>
        <p class="status-message">Chua co bai viet moi.</p>
      </ng-template>
    </aside>

    <section class="news-main">
      <h1 class="page-title">Media</h1>

      <p class="status-message" *ngIf="loading">Dang tai bai viet...</p>
      <p class="status-message status-error" *ngIf="!loading && errorMessage">{{ errorMessage }}</p>

      <div class="news-list" *ngIf="!loading && !errorMessage">
        <p class="status-message" *ngIf="posts.length === 0">Chua co bai viet trong API.</p>

        <article class="news-item" *ngFor="let post of posts; trackBy: trackByPostId">
          <a class="news-thumb" [routerLink]="['/tin-tuc', post.slug]">
            <img [src]="post.thumbnailUrl" [alt]="post.title" (error)="onImageError($event)" />
          </a>

          <div class="news-content">
            <a class="news-title" [routerLink]="['/tin-tuc', post.slug]">{{ post.title }}</a>
            <p class="news-meta">{{ post.category }}</p>
            <p class="news-excerpt">{{ excerpt(post.content) }}</p>
          </div>
        </article>
      </div>
    </section>
  </div>
</div>
