<div class="checkout-page">
  <div class="container py-5">
    <div class="row g-4 align-items-start">
      <div class="col-12 col-lg-7">
        <div class="login-hint d-flex align-items-center justify-content-between mb-4 px-4 py-3 rounded-3">
          <span class="small text-muted">Đăng nhập để mua hàng tiện lợi và nhận nhiều ưu đãi hơn nữa</span>
          <button type="button" class="btn btn-sm btn-outline-primary ms-3 text-nowrap" (click)="openLoginModal()">Đăng nhập</button>
        </div>

        <div *ngIf="submitError" class="alert alert-danger mb-3" role="alert">
          {{ submitError }}
        </div>

        <app-shipping-form
          [form]="form"
          (formChange)="onFormChange($event)"
        ></app-shipping-form>

        <app-payment-method
          [form]="form"
          [total]="total"
          [requireDeposit]="requireDeposit"
          [depositAmount]="depositAmount"
          (formChange)="onFormChange($event)"
        ></app-payment-method>
      </div>

      <div class="col-12 col-lg-5">
        <div class="sticky-summary">
          <app-order-summary
            [cartItems]="cartItems"
            [subtotal]="subtotal"
            [totalDiscount]="totalDiscount"
            [couponAmount]="couponAmount"
            [total]="total"
            [requireDeposit]="requireDeposit"
            [depositAmount]="depositAmount"
            [isSubmitting]="isSubmitting"
            [canSubmit]="canSubmit()"
            [appliedCoupon]="form.couponCode"
            (couponApplied)="onCouponApplied($event)"
            (quantityChange)="onQuantityChange($event)"
            (removeItem)="onRemoveItem($event)"
            (placeOrder)="placeOrder()"
          ></app-order-summary>
        </div>
      </div>
    </div>
  </div>
</div>
