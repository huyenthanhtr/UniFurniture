<div class="tracking-page">
  <section class="tracking-hero">
    <div class="tracking-hero__content">
      <h1>Tra cứu <span>mã vận đơn</span></h1>
      <p>Không cần đăng nhập. Bạn có thể nhập 1 hoặc nhiều mã (phân tách bằng dấu phẩy hoặc xuống dòng).</p>

      <div class="tracking-search">
        <textarea
          rows="2"
          placeholder="Ví dụ: UF-20260315-AB12, UF-20260310-CN88"
          [(ngModel)]="searchCode"
          [disabled]="loading"
        ></textarea>
        <button type="button" (click)="searchOrder()" [disabled]="loading">
          {{ loading ? 'Đang tra cứu...' : 'Tra cứu' }}
        </button>
      </div>
    </div>
  </section>

  <section class="tracking-content" id="tracking-feedback" *ngIf="errorMessage && !orders.length">
    <div class="alert error">{{ errorMessage }}</div>
  </section>

  <section class="tracking-content" id="tracking-results" *ngIf="orders.length">
    <div class="alert info" *ngIf="infoMessage">{{ infoMessage }}</div>
    <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="order-wrap" *ngFor="let order of orders">
      <app-tracking-order-summary
        [order]="order"
        [timelineSteps]="timelineSteps"
        [currentStepIndex]="currentStepIndex(order)"
        [isCancelledOrRefunded]="isCancelledOrRefunded(order)"
        [canRequestCancel]="canRequestCancel(order)"
        [showProductCard]="order.backendStatus !== 'completed'"
        [shopZaloUrl]="shopZaloUrl"
        (completeOrderClick)="completeOrder(order)"
        (toggleCancelClick)="toggleCancelForm(order)"
      />

      <app-tracking-cancel-flow
        [order]="order"
        [cancelReasons]="cancelReasons"
        [cancelSuccess]="cancelSuccessOrderId === order.id"
        (toggleCancelClick)="toggleCancelForm(order)"
        (submitCancelClick)="submitCancelRequest(order)"
        (closeCancelSuccessClick)="closeCancelSuccess()"
      />

      <app-tracking-review-flow
        [order]="order"
        [reviewSubmittingProductKey]="reviewSubmittingProductKey"
        [reviewInlineErrors]="reviewInlineErrors"
        [cameraOpen]="cameraOpen"
        [cameraError]="cameraError"
        [cameraMode]="cameraMode"
        [cameraDevices]="cameraDevices"
        [selectedCameraId]="selectedCameraId"
        [cameraRecording]="cameraRecording"
        [cameraRecordedSeconds]="cameraRecordedSeconds"
        (setRatingClick)="setRating($event.product, $event.value)"
        (imageSelected)="onImageSelected($event.event, $event.product)"
        (videoSelected)="onVideoSelected($event.event, $event.product)"
        (removeImageClick)="removeImageAt($event.product, $event.index)"
        (removeVideoClick)="removeVideoAt($event.product, $event.index)"
        (submitSingleReviewClick)="submitSingleReview($event.order, $event.product)"
        (openCameraImageClick)="openCameraForImage($event)"
        (openCameraVideoClick)="openCameraForVideo($event)"
        (closeCameraClick)="closeCamera()"
        (switchCameraFacingClick)="switchCameraFacing()"
        (cameraDeviceChangeClick)="onCameraDeviceChange($event)"
        (capturePhotoClick)="capturePhotoFromCamera()"
        (startVideoRecordingClick)="startVideoRecording()"
        (stopVideoRecordingClick)="stopVideoRecording()"
        (viewProductClick)="viewProductFromHistory($event.product, $event.target)"
        (buyAgainClick)="buyAgain($event)"
      />
    </div>
  </section>
</div>

<div class="tracking-toast" *ngIf="toastMessage">{{ toastMessage }}</div>


<div class="review-thanks-modal" *ngIf="reviewThanksOpen">
  <div class="review-thanks-modal__backdrop" (click)="closeReviewThanks()"></div>
  <div class="review-thanks-modal__content">
    <h4>Đánh giá đã được ghi nhận</h4>
    <p>{{ reviewThanksMessage }}</p>
    <button type="button" (click)="closeReviewThanks()">Đóng</button>
  </div>
</div>
