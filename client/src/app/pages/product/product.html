<div class="product-page">
    <nav class="breadcrumb">
        <div class="container">
            <a href="/">Trang chủ</a> <span>/</span> <span class="current">{{ pageTitle }}</span>
        </div>
    </nav>

    <div class="container content-container">
        <div class="page-header">
            <h1 class="page-title">{{ pageTitle }}</h1>
            <app-product-sort></app-product-sort>
        </div>

        <div class="filter-section">
            <app-product-filter></app-product-filter>
        </div>

        <div *ngIf="loading" style="text-align:center;padding:40px">Đang tải...</div>

        <main class="main-content" *ngIf="!loading">
            <app-product-grid [products]="products"></app-product-grid>
        </main>
    </div>
</div>
