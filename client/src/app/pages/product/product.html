<div class="product-page">
  <nav class="breadcrumb">
    <div class="container">
      <a routerLink="/">Trang chủ</a>
      <span>/</span>
      <span>Danh mục</span>
      <ng-container *ngIf="breadcrumbParentName()">
        <span>/</span>
        <span>{{ breadcrumbParentName() }}</span>
      </ng-container>
      <span>/</span>
      <span class="current">{{ pageTitle() }}</span>
    </div>
  </nav>

  <div class="product-banner">
    <img
      [src]="bannerImageUrl()"
      [alt]="'Banner ' + pageTitle()"
      class="banner-img"
    />
  </div>

  <div class="container content-container">
    <div class="page-header" #categorySectionRef>
      <h1 class="page-title">{{ pageTitle() }}</h1>
      <app-product-sort [selectedSort]="selectedSort()" (sortChange)="onSortChange($event)"></app-product-sort>
    </div>

    <div class="filter-section" #filterSectionRef>
      <app-product-filter
        [categoryOptions]="filterCategoryOptions()"
        [categoryTree]="filterCategoryTree()"
        [preferredExpandedGroupIds]="preferredExpandedFilterGroupIds()"
        [categoryDefaultLabel]="categoryFilterLabel()"
        [selectedCategoryId]="selectedFilterCategoryId()"
        [selectedCategoryIds]="selectedCategoryIds()"
        [selectedPriceRanges]="selectedPriceRanges()"
        [colorOptions]="filterColorOptions()"
        [selectedColors]="selectedColors()"
        [selectedSizes]="selectedSizes()"
        (filtersChange)="onFilterChange($event)"
      ></app-product-filter>
    </div>

    <main class="main-content">
      <p *ngIf="isLoading()" class="status-message">Đang tải sản phẩm...</p>

      <div *ngIf="!isLoading() && errorMessage()" class="status-block">
        <p class="status-message status-error">{{ errorMessage() }}</p>
        <button class="retry-btn" (click)="retry()">Tải lại</button>
      </div>

      <ng-container *ngIf="!isLoading() && !errorMessage()">
        <app-product-grid [products]="visibleProducts()"></app-product-grid>

        <p *ngIf="visibleProducts().length === 0" class="status-message">Khong co san pham phu hop bo loc hien tai.</p>

        <div class="pagination" *ngIf="totalPages() > 1">
          <button class="page-btn" (click)="previousPage()" [disabled]="currentPage() === 1">Previous</button>

          <button
            class="page-btn page-number"
            *ngFor="let page of pageNumbers()"
            (click)="goToPage(page)"
            [class.active]="page === currentPage()"
          >
            {{ page }}
          </button>

          <button class="page-btn" (click)="nextPage()" [disabled]="currentPage() === totalPages()">Next</button>
        </div>
      </ng-container>
    </main>
  </div>
</div>
