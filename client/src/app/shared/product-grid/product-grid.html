<div class="product-grid">
  <ng-container *ngIf="products && products.length > 0; else emptyState">
    <app-product-card *ngFor="let product of products; trackBy: trackById" [product]="product">
    </app-product-card>
  </ng-container>

  <ng-template #emptyState>
    <p class="empty-state">Khong co san pham de hien thi.</p>
  </ng-template>
</div>
