<header class="moho-header">
  <div class="header-top">

    <button class="mobile-menu-btn" (click)="toggleMobileMenu()" aria-label="Menu">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <a href="/" class="header-logo">
      <img src="assets/images/logo_ngang_no_bg.png" alt="UniFurniture" class="header-logo-img" />
    </a>

    <form class="header-search" (submit)="onSearch($event, searchInput.value)">
      <div class="search-input-wrapper">
        <input #searchInput type="text" class="search-input" placeholder="Tìm kiếm sản phẩm..." />
      </div>
      <button type="submit" class="search-btn" aria-label="Tìm kiếm">
        <svg width="15" height="16" viewBox="0 0 15 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5.5" stroke="white" stroke-width="1.5" />
          <line x1="10.5" y1="11" x2="14" y2="14.5" stroke="white" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
    </form>

    <div class="header-actions">

      <button
        *ngIf="!userProfile"
        class="header-action-link header-action-btn"
        (click)="ui.openAuth('login')"
        aria-label="Đăng nhập"
      >
        <svg class="action-icon" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M11 11C13.2091 11 15 9.20914 15 7C15 4.79086 13.2091 3 11 3C8.79086 3 7 4.79086 7 7C7 9.20914 8.79086 11 11 11Z" stroke="#333" stroke-width="1.3" />
          <path d="M3 19C3 15.134 6.13401 12 10 12H12C15.866 12 19 15.134 19 19" stroke="#333" stroke-width="1.3" stroke-linecap="round" />
        </svg>
        <div class="action-text">
          <span class="action-label">Đăng nhập / Đăng ký</span>
          <span class="action-sublabel">Tài khoản của tôi</span>
        </div>
      </button>

      <div *ngIf="userProfile" class="account-dropdown-wrap" (click)="toggleAccountDropdown($event)">

        <button class="header-action-link header-action-btn account-trigger" aria-label="Tài khoản">
          <div class="header-avatar">
            <img *ngIf="avatarUrl" [src]="avatarUrl" [alt]="displayName" class="header-avatar-img" />
            <div *ngIf="!avatarUrl" class="header-avatar-placeholder">{{ initials }}</div>
          </div>
          <div class="action-text">
            <span class="action-label">{{ displayName }}</span>
            <span class="action-sublabel">Tài khoản của tôi ▾</span>
          </div>
        </button>

        <div class="account-dropdown" [class.open]="isAccountDropdownOpen" (click)="$event.stopPropagation()">

          <div class="dropdown-user-info">
            <div class="dropdown-avatar">
              <img *ngIf="avatarUrl" [src]="avatarUrl" [alt]="displayName" class="header-avatar-img" />
              <div *ngIf="!avatarUrl" class="header-avatar-placeholder">{{ initials }}</div>
            </div>
            <div>
              <div class="dropdown-name">{{ displayName }}</div>
              <div class="dropdown-phone">{{ userProfile?.phone }}</div>
            </div>
          </div>

          <div class="dropdown-divider"></div>

          <button
            *ngFor="let item of accountMenuItems"
            type="button"
            class="dropdown-item"
            (click)="navigateToTab(item.tab)"
          >
            <span>{{ item.label }}</span>
          </button>

          <div class="dropdown-divider"></div>

          <button type="button" class="dropdown-item dropdown-item--logout" (click)="requestLogout($event)">
            <span>Đăng xuất</span>
          </button>

        </div>
      </div>

      <button class="header-action-link cart-link header-action-btn" (click)="ui.openCart()" aria-label="Giỏ hàng">
        <div class="cart-icon-wrapper">
          <svg class="action-icon" width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M2 2H4L4.76 5.61M4.76 5.61L6.76 14.5H17.5L19.5 5.61H4.76Z" stroke="#333" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="8.5" cy="17.5" r="1.5" stroke="#333" stroke-width="1.3" />
            <circle cx="15.5" cy="17.5" r="1.5" stroke="#333" stroke-width="1.3" />
          </svg>
          <span class="cart-badge">{{ ui.cartCount() }}</span>
        </div>
        <span class="action-label cart-label">Giỏ hàng</span>
      </button>

    </div>
  </div>
</header>

<div class="logout-modal-backdrop" *ngIf="showLogoutConfirm" (click)="cancelLogout()">
  <div class="logout-modal" (click)="$event.stopPropagation()">
    <div class="logout-modal__icon">🚪</div>
    <h3>Bạn muốn đăng xuất?</h3>
    <p>Bạn sẽ cần đăng nhập lại để xem thông tin tài khoản.</p>
    <div class="logout-modal__actions">
      <button type="button" class="logout-modal__btn logout-modal__btn--cancel" (click)="cancelLogout()">Hủy</button>
      <button type="button" class="logout-modal__btn logout-modal__btn--confirm" (click)="confirmLogout()">Đăng xuất</button>
    </div>
  </div>
</div>
