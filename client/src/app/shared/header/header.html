<!-- HEADER -->
<header class="moho-header">
  <div class="header-top">
    <!-- Logo -->
    <a href="/" class="header-logo">
      <img src="assets/images/logo_ngang_no_bg.png" alt="UniFurniture" class="header-logo-img" />
    </a>

    <!-- Search Form -->
    <form class="header-search">
      <div class="search-input-wrapper">
        <input type="text" class="search-input" placeholder="Tìm kiếm sản phẩm..." />
      </div>
      <button type="submit" class="search-btn" aria-label="Tìm kiếm">
        <svg width="15" height="16" viewBox="0 0 15 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="6.5" cy="6.5" r="5.5" stroke="white" stroke-width="1.5" />
          <line x1="10.5" y1="11" x2="14" y2="14.5" stroke="white" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
    </form>

    <!-- Right Actions -->
    <div class="header-actions">
      <!-- Account -->
      @if (userProfile) {
      <button class="header-action-link header-action-btn" aria-label="Tài khoản">
        <!-- Active User Icon -->
        <svg class="action-icon" width="22" height="22" viewBox="0 0 22 22" fill="#333333"
          xmlns="http://www.w3.org/2000/svg">
          <path
            d="M11 11C13.2091 11 15 9.20914 15 7C15 4.79086 13.2091 3 11 3C8.79086 3 7 4.79086 7 7C7 9.20914 8.79086 11 11 11Z"
            stroke="#333333" stroke-width="1.3" />
          <path d="M3 19C3 15.134 6.13401 12 10 12H12C15.866 12 19 15.134 19 19" stroke="#333333" stroke-width="1.3"
            stroke-linecap="round" />
        </svg>
        <div class="action-text">
          <span class="action-label">{{ userProfile.full_name }}</span>
          <span class="action-sublabel" (click)="logout()" style="color: #ef4444; cursor: pointer;">Đăng xuất</span>
        </div>
      </button>
      } @else {
      <button class="header-action-link header-action-btn" (click)="ui.openAuth('login')" aria-label="Đăng nhập">
        <svg class="action-icon" width="22" height="22" viewBox="0 0 22 22" fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <path
            d="M11 11C13.2091 11 15 9.20914 15 7C15 4.79086 13.2091 3 11 3C8.79086 3 7 4.79086 7 7C7 9.20914 8.79086 11 11 11Z"
            stroke="#333333" stroke-width="1.3" />
          <path d="M3 19C3 15.134 6.13401 12 10 12H12C15.866 12 19 15.134 19 19" stroke="#333333" stroke-width="1.3"
            stroke-linecap="round" />
        </svg>
        <div class="action-text">
          <span class="action-label">Đăng nhập / Đăng ký</span>
          <span class="action-sublabel">Tài khoản của tôi</span>
        </div>
        <span class="action-caret">&#8964;</span>
      </button>
      }

      <!-- Cart -->
      <button class="header-action-link cart-link header-action-btn" (click)="ui.openCart()" aria-label="Giỏ hàng">
        <div class="cart-icon-wrapper">
          <svg class="action-icon" width="22" height="22" viewBox="0 0 22 22" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M2 2H4L4.76 5.61M4.76 5.61L6.76 14.5H17.5L19.5 5.61H4.76Z" stroke="#333333" stroke-width="1.3"
              stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="8.5" cy="17.5" r="1.5" stroke="#333333" stroke-width="1.3" />
            <circle cx="15.5" cy="17.5" r="1.5" stroke="#333333" stroke-width="1.3" />
          </svg>
          <span class="cart-badge">{{ ui.cartCount() }}</span>
        </div>
        <span class="action-label cart-label">Giỏ hàng</span>
      </button>
    </div>
  </div>
</header>
