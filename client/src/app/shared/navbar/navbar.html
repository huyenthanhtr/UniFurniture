<nav class="moho-navbar">
  <div class="navbar-container">
    <ul class="navbar-list">
      <li
        class="navbar-item has-dropdown"
        [class.menu-open]="isProductsMenuOpen()"
        routerLinkActive="navbar-item--active"
        [routerLinkActiveOptions]="{ exact: false }"
        (mouseenter)="openProductsMenu()"
        (mouseleave)="scheduleCloseProductsMenu()"
        (focusin)="openProductsMenu()"
        (focusout)="scheduleCloseProductsMenu()"
      >
        <a [routerLink]="['/products']" class="navbar-link">
          S&#7843;n ph&#7849;m
          <svg class="dropdown-arrow" width="10" height="6" viewBox="0 0 10 6" fill="none">
            <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
          </svg>
        </a>

        <div
          class="dropdown-panel dropdown-panel--products"
          [class.has-submenu]="activeSubItems().length > 0"
          role="menu"
          aria-label="Danh m&#7909;c s&#7843;n ph&#7849;m"
          (mouseenter)="openProductsMenu()"
          (mouseleave)="scheduleCloseProductsMenu()"
        >
          <div class="product-mega" [class.has-submenu]="activeSubItems().length > 0">
            <div class="product-mega__left">
              <a
                class="dropdown-item dropdown-item--parent product-root-item"
                *ngFor="let group of productGroups(); trackBy: trackByGroup"
                [class.is-active]="activeGroupSlug() === group.root.slug"
                [routerLink]="['/products']"
                [queryParams]="rootQueryParams(group)"
                (mouseenter)="setActiveGroup(group.root.slug)"
              >
                <span>{{ group.root.label }}</span>
                <span class="item-arrow" *ngIf="group.children.length > 0">&#8250;</span>
              </a>
            </div>

            <div class="product-mega__right" *ngIf="activeSubItems().length > 0">
              <a
                class="dropdown-item dropdown-item--child product-sub-item"
                *ngFor="let child of activeSubItems(); trackBy: trackBySubItem"
                [routerLink]="['/products']"
                [queryParams]="submenuQueryParams(child)"
              >
                {{ child.label }}
              </a>
            </div>
          </div>
        </div>
      </li>

      <li class="navbar-item" routerLinkActive="navbar-item--active" [routerLinkActiveOptions]="{ exact: false }">
        <a [routerLink]="['/khuyen-mai']" class="navbar-link">
          Khuy&#7871;n m&#227;i
        </a>
      </li>

      <li class="navbar-item" routerLinkActive="navbar-item--active" [routerLinkActiveOptions]="{ exact: false }">
        <a [routerLink]="['/tin-tuc']" class="navbar-link">Tin t&#7913;c</a>
      </li>

      <li class="navbar-item" routerLinkActive="navbar-item--active" [routerLinkActiveOptions]="{ exact: true }">
        <a [routerLink]="['/ve-unifurniture']" class="navbar-link">V&#7873; U-Home Furni</a>
      </li>

      <li class="navbar-item" routerLinkActive="navbar-item--active" [routerLinkActiveOptions]="{ exact: true }">
        <a [routerLink]="['/cua-hang']" class="navbar-link">C&#7897;ng &#273;&#7891;ng</a>
      </li>

      <li class="navbar-item navbar-item--ar">
        <a routerLink="/ar" class="navbar-link navbar-link--ar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
          Th&#7917; ngay AR
        </a>
      </li>
    </ul>
  </div>
</nav>
