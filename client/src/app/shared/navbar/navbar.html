<div class="mobile-menu-backdrop" [class.open]="ui.isMobileMenuOpen()" (click)="ui.closeMobileMenu()"></div>
<nav class="moho-navbar" [class.nav-hidden]="isHidden()" [class.mobile-open]="ui.isMobileMenuOpen()">
  <div class="navbar-container">
    <ul class="navbar-list">
      <!-- Sản phẩm: desktop = hover, mobile = click accordion -->
      <li class="navbar-item has-dropdown"
        [class.menu-open]="isProductsMenuOpen() || isProductsExpanded()"
        routerLinkActive="navbar-item--active" [routerLinkActiveOptions]="{ exact: false }"
        (mouseenter)="openProductsMenu()" (mouseleave)="scheduleCloseProductsMenu()">

        <!-- Desktop: full link row. Mobile: split link + chevron -->
        <div class="navbar-link-row">
          <a [routerLink]="['/products']" class="navbar-link" (click)="onMobileNavClick()">
            Sản phẩm
            <!-- Desktop only chevron -->
            <svg class="dropdown-arrow desktop-only" width="10" height="6" viewBox="0 0 10 6" fill="none">
              <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
            </svg>
          </a>
          <!-- Mobile only expand trigger -->
          <div class="mobile-expand-trigger" (click)="toggleProductsExpanded($event)">
            <svg class="dropdown-arrow-icon" [class.rotated]="isProductsExpanded()" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
        </div>

        <!-- Desktop dropdown panel (hover triggered via CSS) -->
        <div class="dropdown-panel dropdown-panel--products desktop-dropdown"
          [class.has-submenu]="activeSubItems().length > 0"
          role="menu" aria-label="Danh mục sản phẩm"
          (mouseenter)="openProductsMenu()" (mouseleave)="scheduleCloseProductsMenu()">
          <div class="product-mega" [class.has-submenu]="activeSubItems().length > 0">
            <div class="product-mega__left">
              <a class="dropdown-item dropdown-item--parent product-root-item"
                *ngFor="let group of productGroups(); trackBy: trackByGroup"
                [class.is-active]="activeGroupSlug() === group.root.slug" [routerLink]="['/products']"
                [queryParams]="rootQueryParams(group)" (mouseenter)="setActiveGroup(group.root.slug)"
                (click)="navigateToProductGroup($event, group)">
                <span>{{ group.root.label }}</span>
                <span class="item-arrow" *ngIf="group.children.length > 0">&#8250;</span>
              </a>
            </div>
            <div class="product-mega__right" *ngIf="activeSubItems().length > 0">
              <a class="dropdown-item dropdown-item--child product-sub-item"
                *ngFor="let child of activeSubItems(); trackBy: trackBySubItem" [routerLink]="['/products']"
                [queryParams]="submenuQueryParams(child)" routerLinkActive="is-active"
                [routerLinkActiveOptions]="{ matrixParams: 'ignored', queryParams: 'subset', paths: 'exact', fragment: 'ignored' }"
                (click)="navigateToProductSubItem($event, child)">
                {{ child.label }}
              </a>
            </div>
          </div>
        </div>

        <!-- Mobile accordion panel -->
        <div class="mobile-accordion-panel" [class.mobile-expanded]="isProductsExpanded()">
          <ng-container *ngFor="let group of productGroups(); trackBy: trackByGroup">
            <div class="product-group-row">
              <a class="dropdown-item dropdown-item--parent"
                [class.is-active]="activeGroupSlug() === group.root.slug" [routerLink]="['/products']"
                [queryParams]="rootQueryParams(group)" (click)="navigateToProductGroup($event, group)">
                {{ group.root.label }}
              </a>
              <div class="mobile-expand-trigger-sub" *ngIf="group.children.length > 0"
                (click)="toggleGroupExpansion($event, group.root.slug)">
                <svg class="sub-arrow-icon" [class.rotated]="expandedGroupSlugs().has(group.root.slug)" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </div>
            </div>
            <div class="mobile-sub-accordion" *ngIf="expandedGroupSlugs().has(group.root.slug) && group.children.length > 0">
              <a class="dropdown-item dropdown-item--child"
                *ngFor="let child of group.children; trackBy: trackBySubItem" [routerLink]="['/products']"
                [queryParams]="submenuQueryParams(child)" (click)="onMobileNavClick()">
                {{ child.label }}
              </a>
            </div>
          </ng-container>
        </div>
      </li>

      <li class="navbar-item" routerLinkActive="navbar-item--active" [routerLinkActiveOptions]="{ exact: false }">
        <a [routerLink]="['/khuyen-mai']" class="navbar-link" (click)="onMobileNavClick()">
          Khuyến mãi
        </a>
      </li>


      <li class="navbar-item" routerLinkActive="navbar-item--active" [routerLinkActiveOptions]="{ exact: true }">
        <a [routerLink]="['/ve-unifurniture']" class="navbar-link" (click)="onMobileNavClick()">Về U-Home Furni</a>
      </li>

      <li class="navbar-item" routerLinkActive="navbar-item--active" [routerLinkActiveOptions]="{ exact: true }">
        <a [routerLink]="['/cong-dong']" class="navbar-link" (click)="onMobileNavClick()">Cộng đồng</a>
      </li>

      <li class="navbar-item navbar-item--tracking" routerLinkActive="navbar-item--active" [routerLinkActiveOptions]="{ exact: true }">
        <a [routerLink]="['/tra-cuu-van-don']" class="navbar-link navbar-link--tracking" (click)="onMobileNavClick()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M3 7h13v10H3z" />
            <path d="M16 10h3l2 2v5h-5z" />
            <circle cx="8" cy="18" r="1.7" />
            <circle cx="18" cy="18" r="1.7" />
          </svg>
          Tra cứu vận đơn
        </a>
      </li>

      <li class="navbar-item navbar-item--ar">
        <a routerLink="/ar" class="navbar-link navbar-link--ar" (click)="onMobileNavClick()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
          Thử ngay Room Planner
        </a>
      </li>
    </ul>
  </div>
</nav>
