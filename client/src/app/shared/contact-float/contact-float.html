<!-- Floating Contact Widget -->
<div class="contact-float-wrap">

    <!-- Channel Buttons (expand on open) -->
    @if (ui.isContactOpen()) {
    <div class="contact-channels">

        <!-- Messenger -->
        <a href="https://m.me/unifurniture" target="_blank" class="contact-channel contact-channel--messenger"
            title="Nhắn tin Facebook">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
                <path
                    d="M12 0C5.373 0 0 4.975 0 11.111c0 3.497 1.745 6.616 4.472 8.652V24l4.086-2.242c1.09.301 2.246.464 3.442.464 6.627 0 12-4.975 12-11.111S18.627 0 12 0zm1.193 14.963l-3.056-3.259-5.963 3.259 6.559-6.963 3.13 3.259 5.889-3.259-6.559 6.963z" />
            </svg>
            <span class="channel-label">Messenger</span>
        </a>

        <!-- Zalo -->
        <a href="https://zalo.me/0971141140" target="_blank" class="contact-channel contact-channel--zalo"
            title="Nhắn tin Zalo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
                <path
                    d="M12.49 10.2722c-.13 0-.24.11-.24.24v3.27c0 .13.11.24.24.24.14 0 .24-.1.24-.24v-3.27c0-.13-.1-.24-.24-.24zm-2.41.02c-.13 0-.24.1-.24.24v3.27c0 .12.1.22.22.22h.03c.13 0 .24-.11.24-.24v-1.27l1.01 1.36c.07.09.18.15.3.15h.03c.14 0 .25-.12.25-.26v-3.24c0-.13-.11-.24-.24-.24-.14 0-.25.11-.25.24v1.26l-1.01-1.36c-.07-.09-.18-.14-.3-.14h-.04zm5.52-.02c-.13 0-.24.11-.24.24s.11.24.24.24h.95v2.79h-.95c-.13 0-.24.11-.24.24s.11.24.24.24h2.38c.13 0 .24-.11.24-.24s-.11-.24-.24-.24h-.95v-3.03c0-.13-.11-.24-.24-.24h-1.19zm-8.51.01h-.01c-.14 0-.25.11-.25.25 0 .07.03.13.07.18l1.36 1.64-1.36 1.64c-.04.05-.07.11-.07.18 0 .14.11.25.25.25h.01c.08 0 .15-.04.2-.09l1.55-1.87c.04-.05.06-.11.06-.18s-.02-.13-.06-.18l-1.55-1.87c-.05-.06-.12-.1-.2-.1zM12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.5 15.5c0 .276-.224.5-.5.5h-10c-.276 0-.5-.224-.5-.5v-7c0-.276.224-.5.5-.5h10c.276 0 .5.224.5.5v7z" />
            </svg>
            <span class="channel-label">Zalo</span>
        </a>

        <!-- Phone -->
        <a href="tel:0971141140" class="contact-channel contact-channel--phone" title="Gọi điện">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path
                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.95-.93a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2z" />
            </svg>
            <span class="channel-label">0971 141 140</span>
        </a>

        <!-- Email -->
        <a href="mailto:cskh@unifurniture.vn" class="contact-channel contact-channel--email" title="Email">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
            </svg>
            <span class="channel-label">Email CSKH</span>
        </a>

    </div>
    }

    <!-- Main Toggle Button -->
    <button class="contact-toggle-btn" (click)="ui.toggleContact()" [class.open]="ui.isContactOpen()"
        aria-label="Liên hệ">
        @if (!ui.isContactOpen()) {
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
        } @else {
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
        }
    </button>
</div>
