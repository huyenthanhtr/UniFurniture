<!-- n8n Chat Container -->
<div class="n8n-chat-overlay" [class.active]="ui.isAiChatOpen()" (click)="ui.closeAiChat()">
  <div class="n8n-chat-window" (click)="$event.stopPropagation()">
    <div id="n8n-chat-container"></div>
    <button class="n8n-chat-close-top" (click)="ui.closeAiChat()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
</div>
